bundle: a11y-audit
bundle_version: 19
bundle_date: 2026-06-04
description: >
  Skill for running accessibility audits on web projects. Combines automated
  scanning (axe-core via Puppeteer or Playwright, Lighthouse) with WCAG 2.1
  AA compliance mapping, manual check guidance, and configurable output:
  markdown report only, markdown plus JSON for CI, or markdown plus issue
  tracker tickets (GitHub, GitLab, Linear, Jira). Generic for any web
  project; project-specific standards and output preferences configured via
  a workspace-local .a11y-audit/PROJECT_CONTEXT.md file.

